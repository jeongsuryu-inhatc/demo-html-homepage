<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 🐾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        .hero-emoji { font-size: 64px; line-height: 1; margin-bottom: 12px; }

        .hero h1 {
            font-size: 36px;
            font-weight: 900;
            color: #3d2c1e;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 16px;
            color: #7a5c48;
            max-width: 360px;
            line-height: 1.6;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }

        /* 업로드 영역 */
        .upload-area {
            width: 100%;
            border: 2.5px dashed #f4a06a;
            border-radius: 16px;
            padding: 36px 20px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .upload-area:hover, .upload-area.drag-over {
            background: #fff5ee;
            border-color: #ff6b6b;
        }

        .upload-icon { font-size: 48px; line-height: 1; }

        .upload-label {
            font-size: 16px;
            font-weight: bold;
            color: #555;
        }

        .upload-sub {
            font-size: 13px;
            color: #aaa;
        }

        #fileInput { display: none; }

        /* 미리보기 */
        #previewSection { display: none; width: 100%; flex-direction: column; align-items: center; gap: 20px; }

        #previewImg {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        /* 결과 */
        .result-box {
            width: 100%;
            background: #fafafa;
            border-radius: 16px;
            padding: 20px;
        }

        .result-title {
            font-size: 13px;
            color: #aaa;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .bars { display: flex; flex-direction: column; gap: 12px; }

        .bar-row { display: flex; flex-direction: column; gap: 6px; text-align: left; }

        .bar-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        .bar-track {
            width: 100%;
            height: 14px;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.6s ease;
        }

        .bar-fill.dog { background: linear-gradient(90deg, #f7971e, #ffd200); }
        .bar-fill.cat { background: linear-gradient(90deg, #a18cd1, #fbc2eb); }

        /* 결과 배너 */
        .verdict {
            font-size: 22px;
            font-weight: 900;
            padding: 16px 20px;
            border-radius: 14px;
            width: 100%;
            line-height: 1.5;
        }

        .verdict.dog  { background: #fff8e1; color: #e67e00; }
        .verdict.cat  { background: #f3e5f5; color: #7b1fa2; }
        .verdict.none { background: #f5f5f5; color: #aaa; font-size: 15px; }

        /* 버튼들 */
        .btn-retry {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 36px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-retry:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(255,107,107,0.45);
        }

        /* 로딩 */
        .loading {
            font-size: 15px;
            color: #aaa;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.4; }
        }

        .notice {
            margin-top: 24px;
            font-size: 12px;
            color: #bbb;
            text-align: center;
            line-height: 1.6;
        }

        .back-link {
            margin-bottom: 20px;
            font-size: 14px;
        }

        .back-link a {
            color: #e67e00;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="back-link"><a href="index.html">← 홈으로</a></div>

<div class="hero">
    <div class="hero-emoji">🐾</div>
    <h1>동물상 테스트</h1>
    <p>사진을 업로드하면 AI가<br>강아지상인지 고양이상인지 알아봐요!</p>
</div>

<div class="card">

    <!-- 업로드 영역 -->
    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">📁</div>
        <div class="upload-label">사진을 업로드하세요</div>
        <div class="upload-sub">클릭하거나 파일을 여기에 드래그하세요<br>JPG, PNG, WEBP 지원</div>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <!-- 결과 영역 -->
    <div id="previewSection">
        <img id="previewImg" src="" alt="업로드된 이미지">

        <div class="result-box">
            <div class="result-title">분석 결과</div>
            <div id="loadingMsg" class="loading">🔍 AI가 분석 중입니다...</div>
            <div class="bars" id="bars" style="display:none"></div>
        </div>

        <div class="verdict none" id="verdict" style="display:none"></div>

        <button class="btn-retry" onclick="reset()">🔄 다시 테스트하기</button>
    </div>

</div>

<p class="notice">
    업로드된 이미지는 서버로 전송되지 않으며,<br>
    브라우저 내에서만 처리됩니다.
</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/otQzQmR8n/";

    const LABELS = {
        "강아지": { key: "dog", emoji: "🐶", text: "강아지상이에요!", desc: "귀엽고 친근한 매력이 넘쳐요 🐾" },
        "고양이": { key: "cat", emoji: "😺", text: "고양이상이에요!", desc: "시크하고 세련된 분위기를 가졌어요 ✨" },
    };

    let model = null;

    // 모델 사전 로드
    (async () => {
        model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
    })();

    // 파일 선택
    document.getElementById("fileInput").addEventListener("change", e => {
        if (e.target.files[0]) handleFile(e.target.files[0]);
    });

    // 드래그 앤 드롭
    const uploadArea = document.getElementById("uploadArea");

    uploadArea.addEventListener("dragover", e => {
        e.preventDefault();
        uploadArea.classList.add("drag-over");
    });

    uploadArea.addEventListener("dragleave", () => uploadArea.classList.remove("drag-over"));

    uploadArea.addEventListener("drop", e => {
        e.preventDefault();
        uploadArea.classList.remove("drag-over");
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith("image/")) handleFile(file);
    });

    function handleFile(file) {
        const reader = new FileReader();
        reader.onload = async e => {
            // 미리보기 표시
            const img = document.getElementById("previewImg");
            img.src = e.target.result;

            document.getElementById("uploadArea").style.display = "none";
            const previewSection = document.getElementById("previewSection");
            previewSection.style.display = "flex";
            document.getElementById("loadingMsg").style.display = "block";
            document.getElementById("bars").style.display = "none";
            document.getElementById("verdict").style.display = "none";

            // 이미지 로드 완료 후 예측
            img.onload = async () => {
                if (!model) {
                    model = await tmImage.load(MODEL_URL + "model.json", MODEL_URL + "metadata.json");
                }
                await predict(img);
            };
        };
        reader.readAsDataURL(file);
    }

    async function predict(imgEl) {
        const predictions = await model.predict(imgEl);

        let topIdx = 0;
        predictions.forEach((p, i) => {
            if (p.probability > predictions[topIdx].probability) topIdx = i;
        });

        // 바 렌더링
        const barsEl = document.getElementById("bars");
        barsEl.innerHTML = "";

        predictions.forEach((p, i) => {
            const pct  = (p.probability * 100).toFixed(1);
            const name = p.className;
            const meta = LABELS[name] || { key: "other", emoji: "🐾" };

            const row = document.createElement("div");
            row.className = "bar-row";
            row.innerHTML = `
                <div class="bar-meta">
                    <span>${meta.emoji} ${name}</span>
                    <span>${pct}%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill ${meta.key}" style="width:0%" data-width="${pct}%"></div>
                </div>`;
            barsEl.appendChild(row);
        });

        document.getElementById("loadingMsg").style.display = "none";
        barsEl.style.display = "flex";

        // 바 애니메이션
        requestAnimationFrame(() => {
            barsEl.querySelectorAll(".bar-fill").forEach(el => {
                el.style.width = el.dataset.width;
            });
        });

        // 결과 배너
        const top  = predictions[topIdx];
        const meta = LABELS[top.className] || { key: "none", emoji: "🐾", text: "판단 불가", desc: "" };
        const verdictEl = document.getElementById("verdict");
        verdictEl.style.display = "block";
        verdictEl.className = `verdict ${meta.key}`;
        verdictEl.innerHTML = `${meta.emoji} ${meta.text}<br><small style="font-size:14px;font-weight:normal">${meta.desc}</small>`;
    }

    function reset() {
        document.getElementById("fileInput").value = "";
        document.getElementById("previewImg").src = "";
        document.getElementById("previewSection").style.display = "none";
        document.getElementById("uploadArea").style.display = "flex";
        document.getElementById("bars").innerHTML = "";
        document.getElementById("verdict").style.display = "none";
    }
</script>
</body>
</html>
