<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트 🐾</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 60px;
        }

        .hero {
            text-align: center;
            margin-bottom: 32px;
        }

        .hero-emoji {
            font-size: 64px;
            line-height: 1;
            margin-bottom: 12px;
        }

        .hero h1 {
            font-size: 36px;
            font-weight: 900;
            color: #3d2c1e;
            margin-bottom: 8px;
        }

        .hero p {
            font-size: 16px;
            color: #7a5c48;
            max-width: 360px;
            line-height: 1.6;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 36px 32px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.12);
            text-align: center;
        }

        /* ── 시작 전 상태 ── */
        #startView { display: flex; flex-direction: column; align-items: center; gap: 20px; }

        .animal-icons {
            display: flex;
            gap: 32px;
            font-size: 72px;
            line-height: 1;
        }

        .start-desc {
            font-size: 15px;
            color: #888;
            line-height: 1.7;
        }

        .btn-start {
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 48px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,107,0.4);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-start:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 28px rgba(255,107,107,0.5);
        }

        /* ── 분석 중 상태 ── */
        #analyzeView { display: none; flex-direction: column; align-items: center; gap: 20px; }

        #webcam-container canvas {
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
        }

        .result-box {
            width: 100%;
            background: #fafafa;
            border-radius: 16px;
            padding: 20px;
        }

        .result-title {
            font-size: 13px;
            color: #aaa;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 14px;
        }

        .bars { display: flex; flex-direction: column; gap: 12px; }

        .bar-row { display: flex; flex-direction: column; gap: 6px; text-align: left; }

        .bar-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            color: #444;
        }

        .bar-track {
            width: 100%;
            height: 14px;
            background: #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 0.3s ease;
        }

        .bar-fill.dog  { background: linear-gradient(90deg, #f7971e, #ffd200); }
        .bar-fill.cat  { background: linear-gradient(90deg, #a18cd1, #fbc2eb); }

        /* ── 결과 배너 ── */
        .verdict {
            font-size: 22px;
            font-weight: 900;
            padding: 14px 20px;
            border-radius: 14px;
            width: 100%;
        }

        .verdict.dog { background: #fff8e1; color: #e67e00; }
        .verdict.cat { background: #f3e5f5; color: #7b1fa2; }
        .verdict.none { background: #f5f5f5; color: #aaa; font-size: 16px; }

        .btn-stop {
            background: #eee;
            color: #777;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 28px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-stop:hover { background: #ddd; }

        .notice {
            margin-top: 24px;
            font-size: 12px;
            color: #bbb;
            text-align: center;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="hero-emoji">🐾</div>
    <h1>동물상 테스트</h1>
    <p>AI가 당신의 얼굴을 분석해<br>강아지상인지 고양이상인지 알아봐요!</p>
</div>

<div class="card">

    <!-- 시작 전 -->
    <div id="startView">
        <div class="animal-icons">🐶🐱</div>
        <p class="start-desc">
            카메라를 켜고 얼굴을 정면으로 향해주세요.<br>
            AI가 실시간으로 당신의 동물상을 분석합니다.
        </p>
        <button class="btn-start" onclick="init()">📷 테스트 시작</button>
    </div>

    <!-- 분석 중 -->
    <div id="analyzeView">
        <div id="webcam-container"></div>

        <div class="result-box">
            <div class="result-title">분석 결과</div>
            <div class="bars" id="bars"></div>
        </div>

        <div class="verdict none" id="verdict">분석 중...</div>

        <button class="btn-stop" onclick="stopWebcam()">⏹ 테스트 종료</button>
    </div>

</div>

<p class="notice">
    웹캠 영상은 서버로 전송되지 않으며,<br>
    브라우저 내에서만 처리됩니다.
</p>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
<script>
    const MODEL_URL = "https://teachablemachine.withgoogle.com/models/otQzQmR8n/";

    const LABELS = {
        "강아지": { key: "dog", emoji: "🐶", text: "강아지상이에요!", desc: "귀엽고 친근한 매력이 넘쳐요 🐾" },
        "고양이": { key: "cat", emoji: "😺", text: "고양이상이에요!", desc: "시크하고 세련된 분위기를 가졌어요 ✨" },
    };

    let model, webcam, running = false;

    async function init() {
        document.getElementById("startView").style.display = "none";
        document.getElementById("analyzeView").style.display = "flex";

        const modelURL    = MODEL_URL + "model.json";
        const metadataURL = MODEL_URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        const classCount = model.getTotalClasses();

        // 바 UI 생성
        const barsEl = document.getElementById("bars");
        barsEl.innerHTML = "";
        for (let i = 0; i < classCount; i++) {
            const row = document.createElement("div");
            row.className = "bar-row";
            row.innerHTML = `
                <div class="bar-meta">
                    <span class="bar-label-${i}"></span>
                    <span class="bar-pct-${i}">0%</span>
                </div>
                <div class="bar-track">
                    <div class="bar-fill bar-${i}" style="width:0%"></div>
                </div>`;
            barsEl.appendChild(row);
        }

        webcam = new tmImage.Webcam(280, 280, true);
        await webcam.setup();
        await webcam.play();

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        running = true;
        loop();
    }

    async function loop() {
        if (!running) return;
        webcam.update();
        await predict();
        requestAnimationFrame(loop);
    }

    async function predict() {
        const predictions = await model.predict(webcam.canvas);

        let topIdx = 0;
        predictions.forEach((p, i) => {
            if (p.probability > predictions[topIdx].probability) topIdx = i;
        });

        predictions.forEach((p, i) => {
            const pct  = (p.probability * 100).toFixed(1);
            const name = p.className;
            const meta = LABELS[name] || { key: "other", emoji: "🐾" };

            const labelEl = document.querySelector(`.bar-label-${i}`);
            const pctEl   = document.querySelector(`.bar-pct-${i}`);
            const fillEl  = document.querySelector(`.bar-fill.bar-${i}`);

            if (labelEl) labelEl.textContent = `${meta.emoji} ${name}`;
            if (pctEl)   pctEl.textContent   = `${pct}%`;
            if (fillEl) {
                fillEl.style.width = `${pct}%`;
                fillEl.className   = `bar-fill bar-${i} ${meta.key}`;
            }
        });

        const top  = predictions[topIdx];
        const conf = top.probability;
        const meta = LABELS[top.className] || { key: "none", emoji: "🐾", text: "분석 중...", desc: "" };
        const verdictEl = document.getElementById("verdict");

        if (conf >= 0.6) {
            verdictEl.className = `verdict ${meta.key}`;
            verdictEl.innerHTML = `${meta.emoji} ${meta.text}<br><small style="font-size:14px;font-weight:normal">${meta.desc}</small>`;
        } else {
            verdictEl.className = "verdict none";
            verdictEl.textContent = "🔍 얼굴을 카메라에 가까이 대주세요";
        }
    }

    function stopWebcam() {
        running = false;
        if (webcam) webcam.stop();
        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("analyzeView").style.display = "none";
        document.getElementById("startView").style.display   = "flex";
        document.getElementById("verdict").className  = "verdict none";
        document.getElementById("verdict").textContent = "분석 중...";
    }
</script>
</body>
</html>
